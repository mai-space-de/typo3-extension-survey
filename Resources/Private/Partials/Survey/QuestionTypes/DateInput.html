<html
    data-namespace-typo3-fluid="true"
    xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
>
<div class="mai-survey-question__date">
    <input
        type="date"
        class="mai-survey-question__input"
        name="answers[{question.uid}]"
        id="q{question.uid}"
        data-survey-required="{f:if(condition: question.required, then: '1', else: '0')}"
    />
</div>
</html>
